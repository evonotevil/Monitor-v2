name: 每日合规动态检查

on:
  # 周一至周五 01:33 UTC = 北京/新加坡时间 09:33
  schedule:
    - cron: '33 1 * * 1-5'
  # 支持手动触发（用于测试）
  workflow_dispatch:

permissions:
  contents: write   # 允许 CI 提交更新后的 DB 回仓库

jobs:
  daily-check:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码（浅克隆，仅需最新 commit，避免拉取完整 DB 历史）──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python 环境 ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. 抓取最新数据（写入 DB，已有条目 IGNORE）─────────────────
      # continue-on-error: 抓取/翻译失败不阻断后续日报推送（DB 中已有数据仍可检查）
      - name: Fetch latest data
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python monitor.py run --period week

      # ── 4. 检查昨日新增，有则推送飞书 ────────────────────────────
      - name: Check and notify daily updates
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python daily_check.py

      # ── 5. 将更新后的 DB 提交回仓库 ────────────────────────────────
      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitor.db
          git diff --staged --quiet || \
            git commit -m "🔄 每日数据更新 $(date -u +%Y-%m-%d) [skip ci]"
          git push
